<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Style.css">
    <title>Datos de Colombia</title>
</head>

<body>
    <main class="container">
        <section class="card">
            <span class="badge">API Colombia</span>

            <h1>DEPARTAMENTOS DE COLOMBIA</h1>
            <p>Escribe el nombre de un Departamento de Colombia y obtén sugerencias en tiempo real. Al seleccionar una opción se mostrará información detallada del Departamento.</p>
                    
            <div class="search-container"> 
                <label for="buscar">Departamentos de Colombia:</label>
                <input id="buscar" type="text" placeholder="Buscar Departamentos...">
                <ul id="lista"></ul>
            </div>
            
            <div id="infoDepartment"></div>
        </section>
    </main>

    <script src="./Script.js"></script>
</body>
</html>
